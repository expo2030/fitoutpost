  <style>  /* ─── Reset ──────────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --salmon:      #FFF1E5;
    --salmon-dk:   #F2DFCE;
    --salmon-md:   #FAE8D6;
    --white:       #FFFFFF;
    --black:       #1a1a1a;
    --black-mid:   #262626;
    --claret:      #990033;
    --claret-lt:   #CC0044;
    --teal:        #0D7680;
    --amber:       #E8820C;
    --warm-gray:   #66605A;
    --mid-gray:    #9A948E;
    --card-bg:     #FFFFFF;
    --body-bg:     #FAF5F0;
    --border:      #D8C9A8;
    --border-dk:   #BBA898;
    --serif:  'Playfair Display', 'EB Garamond', Georgia, serif;
    --sans:   Inter, system-ui, sans-serif;
  }
  html  { scroll-behavior: smooth; font-size: 16px; }
  body  {
    font-family: var(--sans);
    background: var(--salmon);
    color: var(--black);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; text-decoration: none; }
  a:hover { color: var(--claret); }

  .util-link:hover { color: #D4C4BA; }

  /* ══════════════════════════════════════════════════════════════════════════
     TIER 2 — MASTHEAD (salmon background, FOP logo + search)
  ══════════════════════════════════════════════════════════════════════════ */
  #masthead {
    background: var(--salmon);
    border-bottom: 2px solid var(--black);
    position: sticky;
    top: 0;
    z-index: 200;
  }
  #masthead-inner {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  /* ─── FOP Logo ──────────────────────────────────────────────────────────── */
  #fop-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    cursor: default;
    user-select: none;
    text-decoration: none;
  }
  #fop-logo:hover { color: inherit; }
  #fop-box {
    width: 52px;
    height: 52px;
    background: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #fop-box span {
    font-family: var(--serif);
    font-weight: 800;
    font-size: 24px;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1;
  }
  #fop-wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }
  #fop-wordmark strong {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.2px;
    color: var(--black);
  }
  #fop-wordmark em {
    font-style: normal;
    font-size: 10px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--warm-gray);
    font-weight: 500;
    margin-top: 2px;
  }


  /* ─── Masthead right ────────────────────────────────────────────────────── */
  #masthead-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .masthead-nav-link {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--black);
    padding: 6px 14px;
    border: 1px solid var(--border-dk);
    transition: background .15s, border-color .15s, color .15s;
    white-space: nowrap;
  }
  .masthead-nav-link:hover {
    background: var(--black);
    border-color: var(--black);
    color: #fff;
  }
  .masthead-nav-link.active {
    background: var(--black);
    border-color: var(--black);
    color: #fff;
  }
  /* Companies Directory — FT-style red CTA */
  .masthead-nav-link--cta {
    background: var(--claret);
    border-color: var(--claret);
    color: #fff;
    font-weight: 600;
    padding: 6px 18px;
    letter-spacing: 0.2px;
  }
  .masthead-nav-link--cta:hover {
    background: var(--claret-lt);
    border-color: var(--claret-lt);
    color: #fff;
  }

  
  /* ─── Contact + Tip links in masthead ──────────────────────────────────── */
  .mh-util-link {
    font-size: 11px;
    color: var(--warm-gray);
    transition: color .15s;
    white-space: nowrap;
  }
  .mh-util-link:hover { color: var(--black); }
  .mh-util-sep {
    width: 1px;
    height: 14px;
    background: var(--border-dk);
    flex-shrink: 0;
  }

  /* ══════════════════════════════════════════════════════════════════════════
     TIER 3 — PRODUCT NAV (News / AlphaEdge / …)
  ══════════════════════════════════════════════════════════════════════════ */
  #product-nav {
    background: var(--black);
    position: sticky;
    top: 72px;
    z-index: 195;
  }
  #product-nav-inner {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 0;
  }
  .pnav-link {
    display: inline-block;
    padding: 0 20px;
    height: 38px;
    line-height: 38px;
    font-size: 12.5px;
    font-weight: 500;
    color: rgba(255,255,255,.65);
    letter-spacing: .3px;
    border-right: 1px solid rgba(255,255,255,.1);
    transition: color .15s, background .15s;
    white-space: nowrap;
    cursor: pointer;
  }
  .pnav-link:first-child { border-left: 1px solid rgba(255,255,255,.1); }
  .pnav-link:hover { color: #fff; background: rgba(255,255,255,.08); }
  .pnav-link.active { color: #fff; background: var(--claret); border-color: var(--claret); }
  .pnav-link.active + .pnav-link { border-left-color: var(--claret); }

  


  /* ─── Page header ────────────────────────────────────────────────────────── */
  #wr-header { background: var(--black); color: #fff; padding: 36px 24px 28px; }
  #wr-hdr-inner {
    max-width: 1320px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: end;
  }
  #wr-title { font-family: var(--serif); font-size: 36px; font-weight: 700;
               letter-spacing: -.5px; line-height: 1; }
  #wr-sub { font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
             color: rgba(255,255,255,.4); margin-bottom: 8px; }
  #wr-meta { text-align: right; font-size: 11px; color: rgba(255,255,255,.4); line-height: 2; }
  #wr-meta strong { color: rgba(255,255,255,.7); font-size: 20px; display: block;
                     font-family: var(--serif); line-height: 1.2; }

  /* ─── Week selector ──────────────────────────────────────────────────────── */
  #week-bar {
    background: var(--salmon); border-bottom: 1px solid var(--border);
    padding: 10px 24px;
  }
  #week-bar-inner {
    max-width: 1320px; margin: 0 auto;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  #week-bar label { font-size: 11px; font-weight: 600; letter-spacing: 1px;
                     text-transform: uppercase; color: var(--warm-gray); }
  #week-select {
    padding: 5px 10px; font-size: 13px; font-family: var(--sans);
    border: 1px solid var(--border); background: var(--white); color: var(--black);
    cursor: pointer; outline: none;
  }
  #week-select:focus { border-color: var(--black); }
  #week-count { font-size: 12px; color: var(--mid-gray); margin-left: auto; }

  /* ─── Main content ────────────────────────────────────────────────────────── */
  #main { max-width: 1320px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ─── Fax header (transmission header) ───────────────────────────────────── */
  .fax-transmission {
    border: 1px solid var(--black); margin-bottom: 32px; background: var(--white);
  }
  .fax-header {
    background: var(--black); color: #fff;
    padding: 10px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .5px;
  }
  .fax-header-field { display: flex; flex-direction: column; gap: 2px; }
  .fax-header-label { color: rgba(255,255,255,.45); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; }
  .fax-header-value { color: #fff; font-size: 12px; }

  /* ─── Continent sections ─────────────────────────────────────────────────── */
  .continent-block { margin: 0; }
  .continent-header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 8px 20px;
    background: var(--row-alt);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  .continent-header:first-child { border-top: none; }
  .continent-name {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--warm-gray); font-family: var(--mono);
  }
  .continent-count {
    font-size: 10px; color: var(--mid-gray); font-family: var(--mono);
  }

  /* ─── Article rows ───────────────────────────────────────────────────────── */
  .article-row {
    display: grid;
    grid-template-columns: 54px 160px 1fr 56px;
    align-items: baseline;
    gap: 0;
    padding: 9px 20px;
    border-bottom: 1px solid var(--border-lt);
    transition: background .1s;
    line-height: 1.4;
  }
  .article-row:last-child { border-bottom: none; }

  <select id="week-select" onchange="renderWeek(this.value)"></select>

</div></div>

<script>
/* ─── Load data from embedded JSON ────────────────────────────────────────── */
let DATA = null;
const slot = document.getElementById("weekly-data");
if (slot && slot.textContent.trim()) {
  try { DATA = JSON.parse(slot.textContent); } catch (e) { console.error("Weekly data parse error:", e.message); }
}

/* ─── Member gate ────────────────────────────────────────────────────────── */
function isRegistered() {
  try { return !!JSON.parse(localStorage.getItem('fop_member') || 'null'); } catch(e) { return false; }
}

/* ─── Helpers ────────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ─── Populate week selector ─────────────────────────────────────────────── */
function populateSelector(weeks) {
  const sel = document.getElementById("week-select");
  sel.innerHTML = weeks.map((w, i) =>
    `<option value="${i}">${esc(w.label)}</option>`
  ).join("");
}

/* ─── Render one week ────────────────────────────────────────────────────── */
function renderWeek(weekIndex) {
  const container = document.getElementById("roundup-container");
  if (!DATA || !DATA.weeks || !DATA.weeks.length) {
    container.innerHTML = `<div class="empty-state">
      No roundups published yet.<br>
      <small>Run <code>python fetch_weekly.py</code> every Monday to generate the week's digest.</small>
    </div>`;
    { const _el=document.getElementById("wr-total-count"); if(_el) _el.textContent="—"; }
    return;
  }

  const w = DATA.weeks[weekIndex] || DATA.weeks[0];
  { const _el=document.getElementById("wr-total-count"); if(_el) _el.textContent=w.total||0; }
  document.getElementById("week-count").textContent =
    `${w.total || 0} articles · generated ${w.generated ? new Date(w.generated).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "—"}`;

  // Fax transmission header
  const faxHeader = `
    <div class="fax-header">
      <div class="fax-header-field">
        <span class="fax-header-label">WEEK</span>
        <span class="fax-header-value">${esc(w.label)}</span>
      </div>
    </div>`;

  // ── Build continent group HTML ────────────────────────────────────────────
  function renderGroup(g) {
    const rows = g.articles.map(a => `
      <div class="article-row">
        <span class="art-date">${esc(a.date_display)}</span>
        <span class="art-market" title="${esc(a.country)}">${esc(a.country)}</span>
        <span class="art-headline">${esc(a.headline)}</span>
        <a class="art-link" href="${esc(a.url)}" target="_blank" rel="noopener">→ Read</a>
      </div>`).join("");
    return `
      <div class="continent-block">
        <div class="continent-header">
          <span class="continent-name">${esc(g.continent)}</span>
          <span class="continent-count">${g.articles.length} article${g.articles.length !== 1 ? "s" : ""}</span>
        </div>
        ${rows}
      </div>`;
  }

  const allGroups = w.groups || [];
  const groups = allGroups.map(renderGroup).join("");
  container.innerHTML = `
    <div class="fax-transmission">
      ${faxHeader}
      ${groups || '<div style="padding:40px 20px;text-align:center;color:var(--warm-gray);font-style:italic">No articles found for this week.</div>'}
    </div>`;
}

/* ─── Init ───────────────────────────────────────────────────────────────── */
{ const _ud=document.getElementById("utility-date");
  if(_ud) _ud.textContent=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
document.getElementById("footer-year").textContent = new Date().getFullYear();

if (DATA && DATA.weeks && DATA.weeks.length) {
  populateSelector(DATA.weeks);
  renderWeek(0);
} else {
  renderWeek(0); // will show empty state
}

document.getElementById('footer-year').textContent = new Date().getFullYear();
</script>
