  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --salmon:      #FFF1E5;
    --salmon-dk:   #F2DFCE;
    --salmon-md:   #FAE8D6;
    --white:       #FFFFFF;
    --black:       #1a1a1a;
    --black-mid:   #262626;
    --claret:      #990033;
    --claret-lt:   #CC0044;
    --teal:        #0D7680;
    --amber:       #E8820C;
    --warm-gray:   #66605A;
    --mid-gray:    #9A948E;

    --card-hover:  #FFF8F3;

  html { scroll-behavior: smooth; font-size: 16px; }
  body { font-family: var(--sans); background: var(--salmon); color: var(--black); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }

  /* ── Filters ───────────────────────────────────────────────────────────── */
  #filters-bar { background: var(--salmon); border-bottom: 1px solid var(--border); padding: 12px 0; position: sticky; top: 110px; z-index: 100; }
  #filters-inner { max-width: 1320px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; font-weight: 500; padding: 5px 14px; border: 1px solid var(--border-dk); background: #fff; color: var(--black-soft); cursor: pointer; transition: all .15s; }
  .filter-btn:hover { border-color: var(--claret); color: var(--claret); }
  .filter-btn.active { background: var(--claret); border-color: var(--claret); color: #fff; }
  #ev-count { font-size: 11px; color: var(--warm-gray); margin-left: auto; }

  /* ── Events grid ───────────────────────────────────────────────────────── */
  #events-wrap { max-width: 1320px; margin: 0 auto; padding: 32px 24px; }
  .year-section { margin-bottom: 8px; }
  .year-heading { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 14px 20px; background: var(--black); color: #fff; user-select: none; border-left: 4px solid var(--claret); }
  .year-heading:hover { background: #2a2a2a; }
  .year-label { font-family: var(--serif); font-size: 24px; font-weight: 800; font-style: italic; flex: 1; }
  .year-count { font-size: 12px; color: rgba(255,255,255,.5); }
  .year-toggle { font-size: 11px; color: rgba(255,255,255,.5); }
  .year-body { padding-top: 24px; }
  .month-group { margin-bottom: 40px; }
  .month-heading { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--black); border-bottom: 2px solid var(--claret); padding-bottom: 8px; margin-bottom: 20px; }
  .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1px; background: var(--salmon); border: 1px solid var(--salmon); }
  .event-card { background: var(--card-bg); border-top: 3px solid var(--claret); padding: 18px 20px; transition: background .18s; }

<!-- ══ Section header ════════════════════════════════════════════════════════ -->
<div class="sec-header">
  <div class="sec-header-inner">
    <div>
      <div class="sec-title">Events</div>
      <div class="sec-tagline">Trade shows, design weeks, conferences and summits — updated weekly.</div>
    </div>
    <div class="sec-updated" id="ev-updated"></div>
  </div>
</div>

<!-- ══ Filter bar ════════════════════════════════════════════════════════════ -->
<div id="filters-bar">
  <div id="filters-inner">
    <button class="filter-btn active" onclick="setFilter('all',this)">All events</button>
    <button class="filter-btn" onclick="setFilter('show',this)">Trade shows</button>
    <button class="filter-btn" onclick="setFilter('design',this)">Design weeks</button>
    <button class="filter-btn" onclick="setFilter('conf',this)">Conferences</button>
    <button class="filter-btn" onclick="setFilter('summit',this)">Summits</button>
    <button class="filter-btn" onclick="setFilter('awards',this)">Awards</button>
    <button class="filter-btn" onclick="setFilter('upcoming',this)">Upcoming only</button>
    <span id="ev-count"></span>
  </div>
</div>

<!-- ══ Events ════════════════════════════════════════════════════════════════ -->
<main id="events-wrap" role="main"></main>

<!--PARTIAL:FOOTER-->

<script>
// ── Load data from embedded JSON slot ─────────────────────────────────────
const _evData = JSON.parse(document.getElementById('events-data')?.textContent || '{"events":[]}');
const EVENTS  = _evData.events || [];
const _evUpdated = _evData.last_updated || '';
if (_evUpdated) {
  const el = document.getElementById('ev-updated');
  try { el.textContent = 'Updated ' + new Date(_evUpdated).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'}); }
  catch(e) { el.textContent = _evUpdated; }
}

// ── Render logic ──────────────────────────────────────────────────────────
let activeFilter = "all";
const today = new Date();
today.setHours(0, 0, 0, 0);

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEvents();
}

function toggleYear(year) {
  const body   = document.getElementById('body-' + year);
  const toggle = document.getElementById('toggle-' + year);
  const open   = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  toggle.textContent = open ? '▼ show' : '▲ hide';
}

function groupByYearMonth(evts) {
  const years = {};
  evts.forEach(e => {
    const d     = new Date(e.iso);
    const year  = d.getFullYear();
    const mKey  = year + '-' + String(d.getMonth() + 1).padStart(2, '0');
    const mLabel = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    if (!years[year]) years[year] = {};
    if (!years[year][mKey]) years[year][mKey] = { label: mLabel, events: [] };
    years[year][mKey].events.push(e);
  });
  return Object.entries(years)
    .sort((a, b) => b[0] - a[0])
    .map(([year, months]) => ({
      year,
      months: Object.entries(months).sort((a, b) => b[0].localeCompare(a[0]))
    }));
}

function badgeClass(type) {
  return ({ show:'badge-show', conf:'badge-conf', design:'badge-design', awards:'badge-awards', summit:'badge-summit' })[type] || 'badge-show';
}
function badgeLabel(type) {
  return ({ show:'Trade show', conf:'Conference', design:'Design week', awards:'Awards', summit:'Summit' })[type] || type;
}

function renderEvents() {
  const currentYear = new Date().getFullYear();
  let filtered = EVENTS.filter(e => {
    if (activeFilter === 'upcoming') return new Date(e.iso) >= today;
    if (activeFilter === 'all') return true;
    return e.type === activeFilter;
  });
  filtered.sort((a, b) => b.iso.localeCompare(a.iso));

  document.getElementById('ev-count').textContent = filtered.length + ' event' + (filtered.length !== 1 ? 's' : '');

  const container = document.getElementById('events-wrap');
  const grouped   = groupByYearMonth(filtered);
  let html = '';

  grouped.forEach(({ year, months }) => {
    const collapsed = parseInt(year) < currentYear;
    const count = months.reduce((s, [, { events }]) => s + events.length, 0);
    html += `<div class="year-section">`;
    html += `<div class="year-heading" onclick="toggleYear('${year}')">`;
    html += `<span class="year-label">${year}</span>`;
    html += `<span class="year-count">${count} events</span>`;
    html += `<span class="year-toggle" id="toggle-${year}">${collapsed ? '▼ show' : '▲ hide'}</span>`;
    html += `</div>`;
    html += `<div class="year-body" id="body-${year}"${collapsed ? ' style="display:none"' : ''}>`;

    months.forEach(([, { label, events }]) => {
      html += `<div class="month-group">`;
      html += `<h2 class="month-heading">${label}</h2>`;
      html += `<div class="events-grid">`;
      events.forEach(e => {
        const isPast = new Date(e.iso) < today;
        html += `<article class="event-card${isPast ? ' past' : ''}">`;
        html += `<div class="event-meta">`;
        html += `<span class="event-date">${e.dates}</span>`;
        html += `<span class="event-badge ${badgeClass(e.type)}">${badgeLabel(e.type)}</span>`;
        html += `</div>`;
        html += `<h3 class="event-name">${e.name}</h3>`;
        html += `<div class="event-location"><span>📍</span>${e.location}</div>`;
        html += `<p class="event-desc">${e.desc}</p>`;
        if (e.url) html += `<a class="event-link" href="${e.url}" target="_blank" rel="noopener">Official website →</a>`;
        html += `</article>`;
      });
      html += `</div></div>`;
    });

    html += `</div></div>`;
  });

  if (!html) html = `<p style="color:var(--warm-gray);padding:40px 24px;">No events match this filter.</p>`;
  container.innerHTML = html;
}

renderEvents();
</script>
<script src="cookie-consent.js"></script>
