name: Daily FitOut Post Fetch & Publish

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      skip_news:
        description: 'Skip news fetch (true/false)'
        required: false
        default: 'false'
      skip_tenders:
        description: 'Skip tenders fetch (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "daily-fetch"
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    name: Fetch intelligence & build site
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests feedparser python-dateutil tqdm

      - name: Fetch news
        if: ${{ github.event.inputs.skip_news != 'true' }}
        run: python fetch_news.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Fetch tenders
        if: ${{ github.event.inputs.skip_tenders != 'true' }}
        run: python fetch_tenders.py
        env:
          PYTHONUNBUFFERED: "1"
          TED_API_KEY: ${{ secrets.TED_API_KEY }}

      - name: Fetch pipeline
        run: python fetch_pipeline.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Build site
        run: python build.py

      - name: Commit updated data and site
        run: |
          git config user.name  "FitOut Post Bot"
          git config user.email "bot@fitoutpost.com"
          git add news.json tenders.json pipeline.json *.html
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily fetch $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify on failure
        if: failure()
        run: echo "::error::Daily fetch failed — check run logs."

  weekly-roundup:
    name: Build weekly roundup (Mondays)
    runs-on: ubuntu-latest
    needs: fetch-and-publish
    if: ${{ github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check if Monday
        id: dow
        run: echo "day=$(date -u +%u)" >> $GITHUB_OUTPUT

      - name: Build weekly roundup
        if: ${{ steps.dow.outputs.day == '1' }}
        run: |
          python build.py --weekly-only
          git config user.name  "FitOut Post Bot"
          git config user.email "bot@fitoutpost.com"
          git add weekly.html
          git diff --cached --quiet || git commit -m "chore: weekly roundup $(date -u '+%Y-%m-%d')"
          git push
