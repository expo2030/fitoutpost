name: "① News — Daily 06:00 UTC"

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    name: Fetch news & rebuild site
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil tqdm beautifulsoup4

      - name: Fetch news
        run: python fetch_news.py
        timeout-minutes: 20
        env:
          PYTHONUNBUFFERED: "1"

      - name: Health check
        run: |
          TOTAL=$(python3 -c "import json; d=json.load(open('news.json')); print(d.get('total_articles', 0))")
          echo "Articles fetched: $TOTAL"
          if [ "$TOTAL" -lt 30 ]; then
            echo "❌ Fetch produced only $TOTAL articles — below minimum threshold of 30. Aborting."
            exit 1
          fi
          echo "✅ Health check passed: $TOTAL articles"

      - name: Build news pages
        # Only rebuild pages news owns — do NOT rebuild sectors/companies/awards
        # (those are pipeline's responsibility and cause rebase conflicts if touched here)
        run: python build.py

      - name: Commit & push
        run: |
          git config user.name  "FitOut Post Bot"
          git config user.email "bot@fitoutpost.com"
          # Stage ONLY files news owns — never touch pipeline/tenders/intelligence outputs
          git add news.json news.html site.html \
                  feed.xml BUILD_INFO.txt sitemap.xml \
                  alphaedge.html betaedge.html gammaedge.html \
                  companies_site.html timeline.html
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore(news): daily fetch $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
