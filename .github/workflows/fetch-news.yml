name: "① News — Daily 06:00 UTC"

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    name: Fetch news & rebuild site
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil tqdm beautifulsoup4

      - name: Fetch news
        run: python fetch_news.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Build site
        run: |
          python build.py
          python build.py --awards

      - name: Commit & push
        run: |
          git config user.name  "FitOut Post Bot"
          git config user.email "bot@fitoutpost.com"
          git add news.json news.html site.html awards.html \
                  alphaedge.html betaedge.html gammaedge.html \
                  weekly.html companies_site.html timeline.html \
                  intelligence.html intelligence.json \
                  BUILD_INFO.txt
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore(news): daily fetch $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
