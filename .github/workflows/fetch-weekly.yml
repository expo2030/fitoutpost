name: "⑤ Weekly Roundup — Monday 08:00 UTC"

on:
  workflow_dispatch:   # manual trigger only — schedule replaced by daily.yml

permissions:
  contents: write

jobs:
  weekly-roundup:
    name: Build weekly roundup & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil

      - name: Generate weekly roundup
        run: python fetch_weekly.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Rebuild events page
        run: python build.py --events

      - name: Commit & push
        run: |
          git config user.name  "FitOut Post Bot"
          git config user.email "bot@fitoutpost.com"
          git add weekly.json weekly.html events.html events.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore(weekly): roundup $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
