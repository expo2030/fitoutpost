name: "⑤ Weekly Roundup — Monday 08:00 UTC"

on:
  schedule:
    - cron: '0 8 * * 1'    # Every Monday at 08:00 UTC (≈ 10:00 Madrid summer time)
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  weekly-roundup:
    name: Build weekly roundup & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil

      - name: Generate weekly roundup
        run: python fetch_weekly.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit & push
        run: |
          git config user.name  "FitOut Post Bot"
          git config user.email "bot@fitoutpost.com"
          git add weekly.json weekly.html
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore(weekly): roundup $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
