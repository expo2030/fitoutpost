name: "② Tenders — Tue/Thu/Sat 12:00 UTC"

on:
  schedule:
    - cron: '0 12 * * 2,4,6'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-tenders:
    name: Fetch tenders & rebuild tenders page
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil tqdm beautifulsoup4

      - name: Fetch tenders
        run: python fetch_tenders.py
        env:
          PYTHONUNBUFFERED: "1"
          TED_API_KEY: ${{ secrets.TED_API_KEY }}

      - name: Build tenders page
        run: python build.py --tenders

      - name: Commit & push
        run: |
          git config user.name  "FitOut Post Bot"
          git config user.email "bot@fitoutpost.com"
          git add tenders.json tenders.html
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore(tenders): fetch $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
