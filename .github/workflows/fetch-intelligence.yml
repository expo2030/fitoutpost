name: "④ Intelligence + Countries — Sunday 08:00 UTC"

on:
  workflow_dispatch:   # manual trigger only — schedule replaced by daily.yml

permissions:
  contents: write

jobs:
  fetch-intelligence:
    name: Fetch intelligence data & rebuild intelligence/countries/weekly
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil tqdm beautifulsoup4

      - name: Fetch intelligence data
        run: python fetch_intelligence.py
        timeout-minutes: 15
        env:
          PYTHONUNBUFFERED: "1"

      - name: Build intelligence & country pages
        run: |
          python build.py --intelligence
          python build_country_pages.py

      - name: Commit & push
        run: |
          git config user.name  "FitOut Post Bot"
          git config user.email "bot@fitoutpost.com"
          git add intelligence.json intelligence.html countries/
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore(intelligence): weekly update $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
