name: "④ Intelligence + Countries — Sunday 08:00 UTC"

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-intelligence:
    name: Fetch intelligence data & rebuild intelligence/countries/weekly
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil tqdm beautifulsoup4

      - name: Fetch intelligence data
        run: python fetch_intelligence.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Fetch weekly roundup source
        run: python fetch_weekly.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Build intelligence, weekly & country pages
        run: |
          python build.py --intelligence
          python build.py --weekly-only
          python build_country_pages.py

      - name: Commit & push
        run: |
          git config user.name  "FitOut Post Bot"
          git config user.email "bot@fitoutpost.com"
          git add intelligence.json intelligence.html \
                  weekly.html countries/
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore(intelligence): weekly update $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
