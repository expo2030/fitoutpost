name: "③ Pipeline — Mon/Wed/Fri 12:00 UTC"

on:
  schedule:
    - cron: '0 12 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-pipeline:
    name: Fetch pipeline signals & rebuild pipeline/awards/countries
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil tqdm beautifulsoup4

      - name: Fetch pipeline
        run: python fetch_pipeline.py
        timeout-minutes: 15
        env:
          PYTHONUNBUFFERED: "1"

      - name: Build pipeline, awards, country & sector pages
        run: |
          python build.py --pipeline
          python build.py --awards
          python build_country_pages.py
          python build_sector_pages.py

      - name: Commit & push
        run: |
          git config user.name  "FitOut Post Bot"
          git config user.email "bot@fitoutpost.com"
          git add pipeline.json pipeline.html awards.json awards.html countries/ sectors/
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore(pipeline): fetch $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
