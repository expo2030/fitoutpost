<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Roundup — FitOut Post</title>
  <meta name="description" content="Every Monday: all fit-out industry news from the previous week, listed by market." />
  <!-- ── SEO: Open Graph ──────────────────────────────────────── -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="FitOut Post" />
  <meta property="og:title" content="Weekly Roundup — FitOut Post" />
  <meta property="og:description" content="Every Monday: all fit-out industry news from the previous week, curated by market and sector." />
  <meta property="og:url" content="https://fitoutpost.com/weekly.html" />
  <meta property="og:image" content="https://fitoutpost.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@fitoutpost" />
  <meta name="twitter:title" content="Weekly Roundup — FitOut Post" />
  <meta name="twitter:description" content="Every Monday: all fit-out industry news from the previous week, curated by market and sector." />
  <meta name="twitter:image" content="https://fitoutpost.com/og-image.png" />
  <!-- Canonical -->
  <link rel="canonical" href="https://fitoutpost.com/weekly.html" />
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="https://fitoutpost.com/favicon.svg" />
  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "FitOut Post",
    "url": "https://fitoutpost.com",
    "description": "Every Monday: all fit-out industry news from the previous week, curated by market and sector.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://fitoutpost.com/?q={{search_term_string}}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <!--ARTICLE-LD-SLOT-->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <!-- Data slot: build.py writes the JSON here -->
  <!--WEEKLY-DATA-SLOT-->
  <style>  /* ─── Reset ──────────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --salmon:      #FFF1E5;
    --salmon-dk:   #F2DFCE;
    --salmon-md:   #FAE8D6;
    --white:       #FFFFFF;
    --black:       #1a1a1a;
    --black-mid:   #262626;
    --claret:      #990033;
    --claret-lt:   #CC0044;
    --teal:        #0D7680;
    --amber:       #E8820C;
    --warm-gray:   #66605A;
    --mid-gray:    #9A948E;
    --card-bg:     #FFFFFF;
    --body-bg:     #FAF5F0;
    --border:      #D8C9A8;
    --border-dk:   #BBA898;
    --serif:  'Playfair Display', 'EB Garamond', Georgia, serif;
    --sans:   Inter, system-ui, sans-serif;
  }
  html  { scroll-behavior: smooth; font-size: 16px; }
  body  {
    font-family: var(--sans);
    background: var(--salmon);
    color: var(--black);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; text-decoration: none; }
  a:hover { color: var(--claret); }

  .util-link:hover { color: #D4C4BA; }

  /* ══════════════════════════════════════════════════════════════════════════
     UTILITY BAR (black top bar — date + links)
  ══════════════════════════════════════════════════════════════════════════ */
  #utility-bar {
    background: var(--black);
    color: #9A8A80;
    font-size: 11px;
    letter-spacing: 0.3px;
    border-bottom: 1px solid #333;
    padding: 0 24px;
  }
  #utility-inner {
    max-width: 1320px;
    margin: 0 auto;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #utility-left  { display: flex; align-items: center; gap: 20px; }
  #utility-right { display: flex; align-items: center; gap: 20px; }
  .util-link { color: #9A8A80; transition: color .15s; }
  .util-link:hover { color: #D4C4BA; }

  /* ══════════════════════════════════════════════════════════════════════════
     TIER 2 — MASTHEAD (salmon background, FOP logo + search)
  ══════════════════════════════════════════════════════════════════════════ */
  #masthead {
    background: var(--salmon);
    border-bottom: 2px solid var(--black);
    position: sticky;
    top: 0;
    z-index: 200;
  }
  #masthead-inner {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  /* ─── FOP Logo ──────────────────────────────────────────────────────────── */
  #fop-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    cursor: default;
    user-select: none;
    text-decoration: none;
  }
  #fop-logo:hover { color: inherit; }
  #fop-box {
    width: 52px;
    height: 52px;
    background: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #fop-box span {
    font-family: var(--serif);
    font-weight: 800;
    font-size: 24px;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1;
  }
  #fop-wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }
  #fop-wordmark strong {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.2px;
    color: var(--black);
  }
  #fop-wordmark em {
    font-style: normal;
    font-size: 10px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--warm-gray);
    font-weight: 500;
    margin-top: 2px;
  }


  /* ─── Masthead right ────────────────────────────────────────────────────── */
  #masthead-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .masthead-nav-link {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--black);
    padding: 6px 14px;
    border: 1px solid var(--border-dk);
    transition: background .15s, border-color .15s, color .15s;
    white-space: nowrap;
  }
  .masthead-nav-link:hover {
    background: var(--black);
    border-color: var(--black);
    color: #fff;
  }
  .masthead-nav-link.active {
    background: var(--black);
    border-color: var(--black);
    color: #fff;
  }
  /* Companies Directory — FT-style red CTA */
  .masthead-nav-link--cta {
    background: var(--claret);
    border-color: var(--claret);
    color: #fff;
    font-weight: 600;
    padding: 6px 18px;
    letter-spacing: 0.2px;
  }
  .masthead-nav-link--cta:hover {
    background: var(--claret-lt);
    border-color: var(--claret-lt);
    color: #fff;
  }
  #mh-linkedin { display: flex; align-items: center; opacity: .85; transition: opacity .15s; }
  #mh-linkedin:hover { opacity: 1; }


  
  /* ─── Contact + Tip links in masthead ──────────────────────────────────── */
  .mh-util-link {
    font-size: 11px;
    color: var(--warm-gray);
    transition: color .15s;
    white-space: nowrap;
  }
  .mh-util-link:hover { color: var(--black); }
  .mh-util-sep {
    width: 1px;
    height: 14px;
    background: var(--border-dk);
    flex-shrink: 0;
  }

  /* ══════════════════════════════════════════════════════════════════════════
     TIER 3 — PRODUCT NAV (News / AlphaEdge / …)
  ══════════════════════════════════════════════════════════════════════════ */
  #product-nav {
    background: var(--black);
    position: sticky;
    top: 72px;
    z-index: 195;
  }
  #product-nav-inner {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 0;
  }
  .pnav-link {
    display: inline-block;
    padding: 0 20px;
    height: 38px;
    line-height: 38px;
    font-size: 12.5px;
    font-weight: 500;
    color: rgba(255,255,255,.65);
    letter-spacing: .3px;
    border-right: 1px solid rgba(255,255,255,.1);
    transition: color .15s, background .15s;
    white-space: nowrap;
    cursor: pointer;
  }
  .pnav-link:first-child { border-left: 1px solid rgba(255,255,255,.1); }
  .pnav-link:hover { color: #fff; background: rgba(255,255,255,.08); }
  .pnav-link.active { color: #fff; background: var(--claret); border-color: var(--claret); }
  .pnav-link.active + .pnav-link { border-left-color: var(--claret); }

  


  /* ─── Page header ────────────────────────────────────────────────────────── */
  #wr-header { background: var(--black); color: #fff; padding: 36px 24px 28px; }
  #wr-hdr-inner {
    max-width: 1320px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: end;
  }
  #wr-title { font-family: var(--serif); font-size: 36px; font-weight: 700;
               letter-spacing: -.5px; line-height: 1; }
  #wr-sub { font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
             color: rgba(255,255,255,.4); margin-bottom: 8px; }
  #wr-meta { text-align: right; font-size: 11px; color: rgba(255,255,255,.4); line-height: 2; }
  #wr-meta strong { color: rgba(255,255,255,.7); font-size: 20px; display: block;
                     font-family: var(--serif); line-height: 1.2; }

  /* ─── Week selector ──────────────────────────────────────────────────────── */
  #week-bar {
    background: var(--salmon); border-bottom: 1px solid var(--border);
    padding: 10px 24px;
  }
  #week-bar-inner {
    max-width: 1320px; margin: 0 auto;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  #week-bar label { font-size: 11px; font-weight: 600; letter-spacing: 1px;
                     text-transform: uppercase; color: var(--warm-gray); }
  #week-select {
    padding: 5px 10px; font-size: 13px; font-family: var(--sans);
    border: 1px solid var(--border); background: var(--white); color: var(--black);
    cursor: pointer; outline: none;
  }
  #week-select:focus { border-color: var(--black); }
  #week-count { font-size: 12px; color: var(--mid-gray); margin-left: auto; }

  /* ─── Main content ────────────────────────────────────────────────────────── */
  #main { max-width: 1320px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ─── Fax header (transmission header) ───────────────────────────────────── */
  .fax-transmission {
    border: 1px solid var(--black); margin-bottom: 32px; background: var(--white);
  }
  .fax-header {
    background: var(--black); color: #fff;
    padding: 10px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .5px;
  }
  .fax-header-field { display: flex; flex-direction: column; gap: 2px; }
  .fax-header-label { color: rgba(255,255,255,.45); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; }
  .fax-header-value { color: #fff; font-size: 12px; }

  /* ─── Continent sections ─────────────────────────────────────────────────── */
  .continent-block { margin: 0; }
  .continent-header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 8px 20px;
    background: var(--row-alt);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  .continent-header:first-child { border-top: none; }
  .continent-name {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--warm-gray); font-family: var(--mono);
  }
  .continent-count {
    font-size: 10px; color: var(--mid-gray); font-family: var(--mono);
  }

  /* ─── Article rows ───────────────────────────────────────────────────────── */
  .article-row {
    display: grid;
    grid-template-columns: 54px 160px 1fr 56px;
    align-items: baseline;
    gap: 0;
    padding: 9px 20px;
    border-bottom: 1px solid var(--border-lt);
    transition: background .1s;
    line-height: 1.4;
  }
  .article-row:last-child { border-bottom: none; }
  .article-row:hover { background: #FDF5EE; }
  .article-row:nth-child(even) { background: var(--row-alt); }
  .article-row:nth-child(even):hover { background: #EEE4D8; }

  .art-date {
    font-family: var(--mono); font-size: 11.5px; color: var(--claret);
    font-weight: 500; white-space: nowrap; padding-right: 12px;
  }
  .art-market {
    font-size: 12px; color: var(--warm-gray); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding-right: 16px; font-family: var(--mono);
  }
  .art-headline {
    font-size: 13px; color: var(--black); font-weight: 400;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    padding-right: 16px; line-height: 1.45;
  }
  .art-link {
    font-size: 11px; font-weight: 600; color: var(--claret); white-space: nowrap;
    text-align: right; letter-spacing: .3px; font-family: var(--mono);
  }
  .art-link:hover { color: var(--claret-lt); }

  /* ─── Empty / loading states ─────────────────────────────────────────────── */
  .empty-state {
    text-align: center; padding: 80px 24px; color: var(--warm-gray);
    font-family: var(--serif); font-size: 18px; font-style: italic;
  }
  .empty-state small { display: block; font-family: var(--sans); font-size: 13px;
                         margin-top: 8px; font-style: normal; }

  /* ─── Member gate / paywall ──────────────────────────────────────────────── */
  .paywall-fade {
    position: relative; overflow: hidden;
  }
  .paywall-fade::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 120px;
    background: linear-gradient(transparent, var(--white));
    pointer-events: none;
  }
  .paywall-wall {
    text-align: center; padding: 36px 32px 40px; border-top: 2px solid var(--border);
    background: var(--salmon);
  }
  .paywall-wall h3 {
    font-family: var(--serif); font-size: 22px; font-weight: 700;
    margin-bottom: 10px; color: var(--black);
  }
  .paywall-wall p {
    font-size: 14px; color: var(--warm-gray); margin-bottom: 20px; line-height: 1.55;
  }
  .paywall-cta {
    display: inline-block; background: var(--claret); color: #fff;
    padding: 11px 32px; font-size: 13px; font-weight: 600;
    letter-spacing: .3px; text-decoration: none; transition: background .15s;
  }
  .paywall-cta:hover { background: var(--claret-lt); color: #fff; }
  .paywall-locked-panel {
    padding: 32px 20px; text-align: center;
    border-top: 1px solid var(--border);
    color: var(--warm-gray); font-size: 13px;
  }
  .paywall-lock-icon { font-size: 22px; margin-bottom: 8px; }
  .paywall-locked-panel strong { color: var(--black); }

  /* ─── Section tabs (News / Pipeline / Tenders / Awards) ─────────────────── */
  #section-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--white);
    overflow-x: auto;
    scrollbar-width: none;
  }
  #section-tabs::-webkit-scrollbar { display: none; }
  .sec-tab {
    padding: 10px 20px;
    font-size: 12px; font-weight: 600; letter-spacing: .4px;
    text-transform: uppercase; color: var(--warm-gray);
    cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap; transition: color .15s, border-color .15s;
    user-select: none;
  }
  .sec-tab:hover { color: var(--black); }
  .sec-tab.active { color: var(--black); border-bottom-color: var(--claret); }
  .sec-tab .tab-count {
    display: inline-block; margin-left: 6px;
    font-size: 10px; font-weight: 500;
    background: var(--salmon-dk); color: var(--warm-gray);
    padding: 1px 5px; border-radius: 8px; letter-spacing: 0;
  }
  .sec-tab.active .tab-count { background: var(--claret); color: #fff; }

  /* ─── Signal section panels ──────────────────────────────────────────────── */
  .signal-panel { display: none; }
  .signal-panel.active { display: block; }

  /* ─── Pipeline rows ──────────────────────────────────────────────────────── */
  .pipeline-row {
    display: grid;
    grid-template-columns: 54px 160px 1fr 80px 56px;
    align-items: baseline;
    gap: 0;
    padding: 9px 20px;
    border-bottom: 1px solid var(--border-lt);
    transition: background .1s;
    line-height: 1.4;
  }
  .pipeline-row:last-child { border-bottom: none; }
  .pipeline-row:hover { background: #FDF5EE; }
  .pipeline-row:nth-child(even) { background: var(--row-alt); }
  .pipeline-row:nth-child(even):hover { background: #EEE4D8; }
  .pl-sector {
    font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
    color: var(--teal); white-space: nowrap; text-align: right;
    padding-left: 8px; font-family: var(--mono);
  }

  /* ─── Tender rows ────────────────────────────────────────────────────────── */
  .tender-row {
    display: grid;
    grid-template-columns: 54px 160px 1fr 90px 56px;
    align-items: baseline;
    gap: 0;
    padding: 9px 20px;
    border-bottom: 1px solid var(--border-lt);
    transition: background .1s;
    line-height: 1.4;
  }
  .tender-row:last-child { border-bottom: none; }
  .tender-row:hover { background: #FDF5EE; }
  .tender-row:nth-child(even) { background: var(--row-alt); }
  .tender-row:nth-child(even):hover { background: #EEE4D8; }
  .td-deadline {
    font-size: 11px; color: var(--amber); font-family: var(--mono);
    white-space: nowrap; padding: 0 8px; text-align: right; font-weight: 600;
  }
  .td-deadline.urgent { color: var(--claret); }

  /* ─── Award rows (same style as news rows) ───────────────────────────────── */
  .award-row {
    display: grid;
    grid-template-columns: 54px 160px 1fr 56px;
    align-items: baseline;
    gap: 0;
    padding: 9px 20px;
    border-bottom: 1px solid var(--border-lt);
    transition: background .1s;
    line-height: 1.4;
  }
  .award-row:last-child { border-bottom: none; }
  .award-row:hover { background: #FDF5EE; }
  .award-row:nth-child(even) { background: var(--row-alt); }
  .award-row:nth-child(even):hover { background: #EEE4D8; }

  /* ─── Footer ─────────────────────────────────────────────────────────────── */
  #footer-inner a { color: rgba(255,255,255,.4); margin-left: 16px; }
  #footer-inner a:hover { color: #fff; }

  /* ─── Responsive ─────────────────────────────────────────────────────────── */

  /* ═══════════════════════════════════════════════════════════════════════
     RESPONSIVE — MOBILE / TABLET
     1024 tablet-landscape · 768 tablet-portrait · 600 large-phone · 430 small
  ═══════════════════════════════════════════════════════════════════════ */

  /* ── Tablet ≤ 1024px ─────────────────────────────────────────────────── */
  @media (max-width: 1024px) {
    #footer-main { grid-template-columns: 2fr 1fr 1fr; }
    #footer-legal { display: none; }
  }

  /* ── Mobile ≤ 768px ──────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    /* Masthead */
    #masthead-inner { height: 56px; gap: 8px; padding: 0 12px; }
    #fop-box { width: 34px; height: 34px; }
    #fop-box span { font-size: 13px; letter-spacing: 0; }
    #masthead-right { gap: 8px; }
    .masthead-nav-link { font-size: 11.5px; padding: 5px 10px; }
    .masthead-nav-link span { display: none; }
    #reg-btn { font-size: 11px; padding: 5px 10px !important; white-space: nowrap; }

    /* Utility bar */
    #utility-bar { display: none; }

    /* Product nav — scrollable strip on mobile */
    #product-nav {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      top: 56px;          /* matches mobile masthead height */
    }
    #product-nav::-webkit-scrollbar { display: none; }
    #product-nav-inner {
      padding: 0;
      width: max-content;
      min-width: 100%;
    }
    .pnav-link { padding: 0 13px; font-size: 11.5px; height: 36px; line-height: 36px; }

    /* Section (continent) nav bar */
    #nav-bar { top: 92px; } /* 56 masthead + 36 pnav */

    /* Section header hero */
    .sec-header { padding: 22px 0 18px; }
    .sec-header-inner { padding: 0 14px; }
    .sec-title { font-size: 26px !important; }
    .sec-tagline { font-size: 13px; max-width: 100%; }

    /* Main content area */
    #main { padding: 16px 12px 48px; }

    /* Articles grid */
    .articles-grid { grid-template-columns: 1fr !important; }

    /* Footer */
    #footer { padding: 40px 16px 24px; }
    #footer-main { grid-template-columns: 1fr !important; gap: 24px; }
    #footer-legal { display: none; }
    #summary-strip { grid-template-columns: repeat(2, 1fr) !important; }

    /* Sub-bar / filter controls — stack vertically */
    .sub-bar {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 10px 12px;
    }
    .sub-select, .sub-input, .sub-search {
      width: 100%;
      max-width: none;
      box-sizing: border-box;
    }

    /* Data table — horizontal scroll */
    .data-table-wrap, .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .data-table { min-width: 700px; }

    /* Continent / period tab strips — scrollable */
    .continent-tabs, .period-pills, .filter-tabs {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap !important;
    }
    .continent-tabs::-webkit-scrollbar,
    .period-pills::-webkit-scrollbar,
    .filter-tabs::-webkit-scrollbar { display: none; }

    /* Awards grid */
    .awards-grid { grid-template-columns: 1fr !important; }

    /* Tenders layout — collapse sidebar */
    .tenders-layout { grid-template-columns: 1fr !important; }
    #tenders-sidebar { display: none; }

    /* Pipeline filter row */
    .filter-row, .filters-row {
      flex-direction: column;
      gap: 8px;
    }
    .filter-row select, .filter-row input,
    .filters-row select, .filters-row input { width: 100%; }

    /* Weekly fax */
    .fax-transmission { margin: 16px 0; border-radius: 0; }
    .fax-header { flex-wrap: wrap; gap: 8px; }

    /* Intelligence summary cards */
    #summary-strip { grid-template-columns: repeat(2, 1fr) !important; }

    /* Search overlay */
    #search-overlay-box { width: calc(100% - 32px); max-width: none; margin: 0 16px; }
  }

  /* ── Small phone ≤ 430px ─────────────────────────────────────────────── */
  @media (max-width: 430px) {
    .pnav-link { padding: 0 10px; font-size: 11px; }
    .sec-title { font-size: 22px !important; }
    .sec-tagline { font-size: 12px; }
    #main { padding: 12px 10px 40px; }
    #summary-strip { grid-template-columns: 1fr !important; }
    .award-card, .card { padding: 14px 14px; }
    .tab { font-size: 11px; padding: 9px 11px; }
  }


  /* ── Mobile landscape (phone rotated) ───────────────────────────────────── */
  @media (max-width: 900px) and (orientation: landscape) and (max-height: 500px) {
    #fop-wordmark { display: flex !important; }
    #masthead-inner { height: 48px; gap: 10px; }
    #product-nav { top: 48px; }
    #nav-bar { top: 84px; }
    #fop-wordmark strong { font-size: 16px; }
    #fop-wordmark em { display: none; }
  }


  /* ── Section header ──────────────────────────────────────────────────────── */
  .sec-header { background: var(--black); color: #fff; padding: 40px 0 32px; border-bottom: 1px solid #333; }
  .sec-header-inner { max-width: 1320px; margin: 0 auto; padding: 0 24px; }
  .sec-title { font-family: var(--serif); font-size: 46px; font-weight: 700; line-height: 1.2; color: #fff; margin-bottom: 8px; }
  .sec-title span { color: var(--claret); }
  .sec-tagline { font-size: 14px; color: rgba(255,255,255,.55); max-width: 520px; line-height: 1.6; }

<body>

  <div id="utility-inner">
    <div id="utility-left">
      <span id="utility-date"></span>

    <div id="utility-right">
      <a class="util-link" href="mailto:hello@fitoutpost.com">Contact: hello@fitoutpost.com</a>

<!-- ══ Section header ════════════════════════════════════════════════════════ -->
<div class="sec-header">
  <div class="sec-header-inner">
    <div class="sec-title">Roundup</div>
    <div class="sec-tagline">A weekly digest of the most significant fit-out industry stories.</div>
  </div>
</div>

<div id="week-bar"><div id="week-bar-inner">
  <label for="week-select">Edition</label>
  <select id="week-select" onchange="renderWeek(this.value)"></select>
  <span id="week-count" style="display:none"></span>
</div></div>

<div id="main">
  <div id="roundup-container">
    <div class="empty-state">Loading roundup…</div>
  </div>
</div>




<!--PARTIAL:FOOTER-->

<script>
/* ─── Load data from embedded JSON ────────────────────────────────────────── */
let DATA = null;
const slot = document.getElementById("weekly-data");
if (slot && slot.textContent.trim()) {
  try { DATA = JSON.parse(slot.textContent); } catch (e) { console.error("Weekly data parse error:", e.message); }
}

/* ─── Member gate ────────────────────────────────────────────────────────── */
function isRegistered() {
  try {
    const m = JSON.parse(localStorage.getItem('fop_member') || 'null');
    return !!(m && (m.email || m.id));
  } catch(e) { return false; }
}

/* ─── Helpers ────────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ─── Populate week selector ─────────────────────────────────────────────── */
function populateSelector(weeks) {
  const sel = document.getElementById("week-select");
  if (!sel) return;
  sel.innerHTML = weeks.map((w, i) =>
    `<option value="${i}">${esc(w.label)}</option>`
  ).join("");
}

/* ─── Section tab switching ──────────────────────────────────────────────── */
let _activeTab = "news";
function switchTab(name) {
  _activeTab = name;
  document.querySelectorAll(".sec-tab").forEach(t =>
    t.classList.toggle("active", t.dataset.tab === name));
  document.querySelectorAll(".signal-panel").forEach(p =>
    p.classList.toggle("active", p.dataset.panel === name));
}

/* ─── Continent group renderer (generic) ─────────────────────────────────── */
function renderGroup(g, rowRenderer) {
  const items = g.items || g.articles || [];
  if (!items.length) return "";
  const rows = items.map(rowRenderer).join("");
  return `
    <div class="continent-block">
      <div class="continent-header">
        <span class="continent-name">${esc(g.continent)}</span>
        <span class="continent-count">${items.length} item${items.length !== 1 ? "s" : ""}</span>
      </div>
      ${rows}
    </div>`;
}

/* ─── Row renderers per signal type ──────────────────────────────────────── */
function newsRow(a) {
  return `<div class="article-row">
    <span class="art-date">${esc(a.date_display)}</span>
    <span class="art-market" title="${esc(a.country)}">${esc(a.country)}</span>
    <span class="art-headline">${esc(a.headline)}</span>
    <a class="art-link" href="${esc(a.url)}" target="_blank" rel="noopener">→ Read</a>
  </div>`;
}

function pipelineRow(p) {
  return `<div class="pipeline-row">
    <span class="art-date">${esc(p.date_display)}</span>
    <span class="art-market" title="${esc(p.country)}">${esc(p.country)}</span>
    <span class="art-headline">${esc(p.title)}</span>
    <span class="pl-sector">${esc(p.sector || "")}</span>
    <a class="art-link" href="${esc(p.url)}" target="_blank" rel="noopener">→ Read</a>
  </div>`;
}

function tenderRow(t) {
  const dl = t.deadline ? t.deadline.substring(0, 10) : "";
  const dlDays = t.deadline_days != null ? t.deadline_days : null;
  const dlClass = dlDays !== null && dlDays <= 7 ? "td-deadline urgent" : "td-deadline";
  const dlText = dl ? dl.substring(5).replace("-", " ") : "—";
  return `<div class="tender-row">
    <span class="art-date">${esc(t.date_display)}</span>
    <span class="art-market" title="${esc(t.country)}">${esc(t.country)}</span>
    <span class="art-headline">${esc(t.title)}</span>
    <span class="${dlClass}">${dlText}</span>
    <a class="art-link" href="${esc(t.url)}" target="_blank" rel="noopener">→ Read</a>
  </div>`;
}

function awardRow(a) {
  return `<div class="award-row">
    <span class="art-date">${esc(a.date_display)}</span>
    <span class="art-market" title="${esc(a.country)}">${esc(a.country)}</span>
    <span class="art-headline">${esc(a.headline)}</span>
    <a class="art-link" href="${esc(a.url)}" target="_blank" rel="noopener">→ Read</a>
  </div>`;
}

/* ─── Column headers per section ─────────────────────────────────────────── */
function colHeader(cols) {
  return `<div style="display:grid;grid-template-columns:${cols.map(c=>c.w).join(" ")};padding:5px 20px;border-bottom:1px solid var(--border);background:var(--salmon);">
    ${cols.map(c=>`<span style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mid-gray)">${c.label}</span>`).join("")}
  </div>`;
}

/* ─── Render one week ────────────────────────────────────────────────────── */
function renderWeek(weekIndex) {
  const container = document.getElementById("roundup-container");
  if (!DATA || !DATA.weeks || !DATA.weeks.length) {
    container.innerHTML = `<div class="empty-state">
      No roundups published yet.<br>
      <small>The full weekly roundup is published every Monday.</small>
    </div>`;
    return;
  }

  const w = DATA.weeks[parseInt(weekIndex, 10)] || DATA.weeks[0];

  const nTotal = w.news_total     ?? (w.groups || []).reduce((s,g)=>(s+(g.items||g.articles||[]).length),0);
  const pTotal = w.pipeline_total ?? 0;
  const tTotal = w.tenders_total  ?? 0;
  const aTotal = w.awards_total   ?? 0;
  const grand  = w.total ?? nTotal;

  { const el = document.getElementById("week-count");
    if (el) el.textContent = `${grand} signals · generated ${w.generated
      ? new Date(w.generated).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "—"}`; }

  const faxHeader = `<div class="fax-header">
    <div class="fax-header-field">
      <span class="fax-header-label">EDITION</span>
      <span class="fax-header-value">${esc(w.label)}</span>
    </div>
    <div class="fax-header-field">
      <span class="fax-header-label">SIGNALS</span>
      <span class="fax-header-value">${grand}</span>
    </div>
    <div class="fax-header-field">
      <span class="fax-header-label">GENERATED</span>
      <span class="fax-header-value">${w.generated
        ? new Date(w.generated).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "—"}</span>
    </div>
  </div>`;

  const tabs = `<div id="section-tabs">
    <span class="sec-tab active" data-tab="news" onclick="switchTab('news')">
      News <span class="tab-count">${nTotal}</span>
    </span>
    <span class="sec-tab" data-tab="pipeline" onclick="switchTab('pipeline')">
      Pipeline <span class="tab-count">${pTotal}</span>
    </span>
    <span class="sec-tab" data-tab="tenders" onclick="switchTab('tenders')">
      Tenders <span class="tab-count">${tTotal}</span>
    </span>
    <span class="sec-tab" data-tab="awards" onclick="switchTab('awards')">
      Awards <span class="tab-count">${aTotal}</span>
    </span>
  </div>`;

  // ── Full content (members only) ─────────────────────────────────────────
  if (isRegistered()) {
    const newsGroups = (w.groups || []).map(g => renderGroup(g, newsRow)).join("");
    const newsPanel = `<div class="signal-panel active" data-panel="news">
      ${colHeader([{label:"Date",w:"54px"},{label:"Market",w:"160px"},{label:"Headline",w:"1fr"},{label:"",w:"56px"}])}
      ${newsGroups || '<div style="padding:40px 20px;text-align:center;color:var(--warm-gray);font-style:italic">No news this week.</div>'}
    </div>`;

    const plGroups = (w.pipeline_groups || []).map(g => renderGroup(g, pipelineRow)).join("");
    const plPanel = `<div class="signal-panel" data-panel="pipeline">
      ${colHeader([{label:"Date",w:"54px"},{label:"Market",w:"160px"},{label:"Project",w:"1fr"},{label:"Sector",w:"80px"},{label:"",w:"56px"}])}
      ${plGroups || '<div style="padding:40px 20px;text-align:center;color:var(--warm-gray);font-style:italic">No pipeline projects this week.</div>'}
    </div>`;

    const tdGroups = (w.tenders_groups || []).map(g => renderGroup(g, tenderRow)).join("");
    const tdPanel = `<div class="signal-panel" data-panel="tenders">
      ${colHeader([{label:"Issued",w:"54px"},{label:"Market",w:"160px"},{label:"Tender",w:"1fr"},{label:"Deadline",w:"90px"},{label:"",w:"56px"}])}
      ${tdGroups || '<div style="padding:40px 20px;text-align:center;color:var(--warm-gray);font-style:italic">No tenders this week.</div>'}
    </div>`;

    const awGroups = (w.awards_groups || []).map(g => renderGroup(g, awardRow)).join("");
    const awPanel = `<div class="signal-panel" data-panel="awards">
      ${colHeader([{label:"Date",w:"54px"},{label:"Market",w:"160px"},{label:"Award Signal",w:"1fr"},{label:"",w:"56px"}])}
      ${awGroups || '<div style="padding:40px 20px;text-align:center;color:var(--warm-gray);font-style:italic">No contract awards identified this week.</div>'}
    </div>`;

    container.innerHTML = `<div class="fax-transmission">
      ${faxHeader}${tabs}
      ${newsPanel}${plPanel}${tdPanel}${awPanel}
    </div>`;
    return;
  }

  // ── Teaser (non-members) ────────────────────────────────────────────────
  // Show fax header + tabs + first 3 news items (faded) + paywall wall
  const firstGroups = w.groups || [];
  let teaserRows = "";
  let teaserCount = 0;
  for (const g of firstGroups) {
    const items = g.items || g.articles || [];
    for (const a of items) {
      if (teaserCount >= 3) break;
      teaserRows += newsRow(a);
      teaserCount++;
    }
    if (teaserCount >= 3) break;
  }

  const teaserPanel = `<div class="signal-panel active" data-panel="news">
    ${colHeader([{label:"Date",w:"54px"},{label:"Market",w:"160px"},{label:"Headline",w:"1fr"},{label:"",w:"56px"}])}
    <div class="paywall-fade">${teaserRows}</div>
  </div>`;

  const lockedPanel = (label, count) =>
    `<div class="signal-panel" data-panel="${label.toLowerCase()}">
      <div class="paywall-locked-panel">
        <div class="paywall-lock-icon">🔒</div>
        <strong>${count} ${label} signals this week</strong><br>
        Register free to access the full ${label.toLowerCase()} roundup.
      </div>
    </div>`;

  const paywall = `<div class="paywall-wall">
    <h3>Members-only content</h3>
    <p>The full weekly roundup — news, pipeline, tenders and contract awards — is<br>
    free for registered FitOut Post members. Registration takes 30 seconds.</p>
    <a class="paywall-cta" href="register.html">Register free →</a>
    <p style="margin-top:14px;font-size:12px;color:var(--mid-gray);">
      Already a member? <a href="register.html" style="color:var(--claret);">Sign in</a>
    </p>
  </div>`;

  container.innerHTML = `<div class="fax-transmission">
    ${faxHeader}${tabs}
    ${teaserPanel}
    ${lockedPanel("Pipeline", pTotal)}
    ${lockedPanel("Tenders", tTotal)}
    ${lockedPanel("Awards", aTotal)}
    ${paywall}
  </div>`;
}

/* ─── Init ───────────────────────────────────────────────────────────────── */
{ const _ud=document.getElementById("utility-date");
  if(_ud) _ud.textContent=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
{ const _fy=document.getElementById("footer-year"); if(_fy) _fy.textContent=new Date().getFullYear(); }

if (DATA && DATA.weeks && DATA.weeks.length) {
  populateSelector(DATA.weeks);
  renderWeek(0);
} else {
  renderWeek(0); // will show empty state
}

{ const _fy=document.getElementById('footer-year'); if(_fy) _fy.textContent=new Date().getFullYear(); }
</script>
